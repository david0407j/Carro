<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Multimarcas{% endblock %}</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navbar */
        header {
            background: #0d6efd;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        nav {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            color: #fff;
            font-size: 1.5rem;
            font-weight: bold;
            text-decoration: none;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 10px;
            align-items: center;
        }

        nav ul li {
            display: flex;
            align-items: center;
        }

        nav ul li a {
            text-decoration: none;
            color: white;
            padding: 10px 15px;
            border-radius: 6px;
            transition: 0.3s;
        }

        nav ul li a:hover {
            background: rgba(255,255,255,0.2);
        }

        .username {
            color: #fff;
            font-weight: bold;
            margin-right: 10px;
        }

        /* Conteúdo */
        main {
            flex: 1;
            max-width: 1200px;
            width: 100%;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* Rodapé */
        footer {
            background: #212529;
            color: #fff;
            text-align: center;
            padding: 20px;
            margin-top: auto;
        }

        @media (max-width: 768px) {
            nav {
                flex-direction: column;
                height: auto;
                padding: 15px;
            }

            nav ul {
                margin-top: 10px;
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

<header>
    <nav>
        <a href="{% url 'cars_list' %}" class="logo">🚗 Multimarcas</a>

        <ul>
            <li><a href="{% url 'cars_list' %}">Carros</a></li>

            {% if user.is_authenticated %}
                <li class="username">Olá, {{ user.username }}</li>
                <li><a href="{% url 'new_car' %}">Cadastrar Carro</a></li>
                <li><a href="{% url 'logout' %}">Sair</a></li>
            {% else %}
                <li><a href="{% url 'login' %}">Login</a></li>
                <li><a href="{% url 'register' %}">Cadastrar-se</a></li>
            {% endif %}
        </ul>
    </nav>
</header>

<main>
    {% block content %}
    {% endblock %}
</main>

<footer>
    <p>&copy; 2026 Multimarcas - Todos os direitos reservados.</p>
</footer>

</body>
</html>
