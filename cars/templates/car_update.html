{% extends "base.html" %}

{% block title %}Editar Carro{% endblock %}

{% block content %}

<style>
:root{
    --primary-color:#00b4d8;
    --primary-hover:#0077b6;
    --danger-color:#ff4d6d;
    --danger-hover:#c1121f;
    --secondary-color:#6c757d;
    --secondary-hover:#495057;
    --bg-color:#f5f7fa;
    --border-color:#e9ecef;
}

.form-container{
    max-width:850px;
    margin:50px auto;
    padding:40px;
    background:#fff;
    border-radius:24px;
    box-shadow:0 15px 40px rgba(0,0,0,.08);
}

.form-title{
    text-align:center;
    font-size:2rem;
    margin-bottom:35px;
    color:#333;
    font-weight:700;
}

table{
    width:100%;
    border-collapse:separate;
    border-spacing:0 15px;
}

th{
    width:180px;
    color:#555;
    font-weight:600;
    vertical-align:middle;
}

td{
    padding:5px 0;
}

input,
select,
textarea{
    width:100%;
    padding:14px;
    border:1px solid var(--border-color);
    border-radius:14px;
    background:#fafafa;
    font-size:15px;
    transition:.3s;
    box-sizing:border-box;
}

textarea{
    min-height:120px;
    resize:vertical;
}

input:focus,
select:focus,
textarea:focus{
    outline:none;
    border-color:var(--primary-color);
    box-shadow:0 0 0 4px rgba(0,180,216,.15);
}

.errorlist{
    list-style:none;
    color:#dc3545;
    margin-top:8px;
    padding:0;
}

.buttons-container{
    margin-top:40px;
    display:flex;
    justify-content:center;
    gap:18px;
    flex-wrap:wrap;
}

.btn-custom{
    display:inline-flex;
    justify-content:center;
    align-items:center;
    gap:8px;
    min-width:180px;
    padding:14px 28px;
    border:none;
    border-radius:16px;
    text-decoration:none;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.btn-custom:hover{
    transform:translateY(-3px);
}

.btn-edit{
    background:linear-gradient(135deg,#00b4d8,#0077b6);
    color:white;
}

.btn-edit:hover{
    box-shadow:0 10px 25px rgba(0,119,182,.35);
}

.btn-delete{
    background:linear-gradient(135deg,#ff4d6d,#c1121f);
    color:white;
}

.btn-delete:hover{
    box-shadow:0 10px 25px rgba(193,18,31,.35);
}

.btn-back{
    background:linear-gradient(135deg,#6c757d,#495057);
    color:white;
}

.btn-back:hover{
    box-shadow:0 10px 25px rgba(73,80,87,.35);
}

@media(max-width:768px){

    .form-container{
        margin:20px;
        padding:25px;
    }

    table,
    tbody,
    tr,
    th,
    td{
        display:block;
        width:100%;
    }

    th{
        margin-bottom:5px;
    }

    .buttons-container{
        flex-direction:column;
    }

    .btn-custom{
        width:100%;
    }
}
</style>

<div class="form-container">

    <h1 class="form-title">
        ✏️ Editar Carro
    </h1>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <table>
            {{ form.as_table }}
        </table>

        <div class="buttons-container">

            <button type="submit"
                    class="btn-custom btn-edit">
                💾 Salvar Alterações
            </button>

            <a href="{% url 'car_delete' object.pk %}"
               class="btn-custom btn-delete">
                🗑️ Excluir
            </a>

            <a href="{% url 'cars_list' %}"
               class="btn-custom btn-back">
                ← Voltar
            </a>

        </div>

    </form>

</div>

{% endblock %}
