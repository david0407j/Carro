{% extends 'base.html' %}

{% block content %}
<h2>Login</h2>
<form method="post">
    {% csrf_token %}

    <div class="form-group">
        {{ login_form.username.errors }}
        <label for="{{ login_form.username.id_for_label }}">
            Usuário:
        </label>
        {{ login_form.username }}
    </div>

    <div class="form-group">
        {{ login_form.password.errors }}
        <label for="{{ login_form.password.id_for_label }}">
            Senha:
        </label>
        {{ login_form.password }}
    </div>

    <div class="form-group">
        <button type="submit">Entrar</button>
    </div>
</form>
{% endblock %}
